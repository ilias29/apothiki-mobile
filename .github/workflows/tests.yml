name: Inventory tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile
        run: python -m py_compile app_inventory_search.py app_inventory_stable.py inventory_base.py pages/1_Search_Identifiers.py
      - name: Test
        run: pytest -q
